name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR/branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check (node --check)
        run: |
          set -e
          files=(
            popup/popup.js
            options/options.js
            background/service-worker.js
          )
          for f in "${files[@]}"; do
            echo "::group::node --check $f"
            node --check "$f"
            echo "::endgroup::"
          done

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check (py_compile)
        run: python -m py_compile native-host/vault_clipper_host.py
      - name: Style check (ruff)
        run: |
          pip install ruff==0.6.9
          ruff check native-host/ --select=E,F,W --ignore=E501

  lint-shell:
    name: Lint shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax
        run: bash -n install.sh
      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: .
          additional_files: install.sh

  validate-manifest:
    name: Validate extension manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          set -e
          for f in manifest.json native-host/com.vaultclipper.host.json; do
            echo "Checking $f"
            jq empty "$f"
          done
      - name: Manifest V3 sanity checks
        run: |
          set -e
          MV=$(jq -r '.manifest_version' manifest.json)
          if [ "$MV" != "3" ]; then
            echo "::error file=manifest.json::manifest_version must be 3, got $MV"
            exit 1
          fi
          for key in name version description permissions action background icons; do
            if ! jq -e ".${key}" manifest.json >/dev/null; then
              echo "::error file=manifest.json::missing required key: ${key}"
              exit 1
            fi
          done
          echo "manifest.json: OK"

  web-ext-lint:
    name: web-ext lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install web-ext
        run: npm install --global web-ext@8.3.0
      - name: Lint extension
        # Mozilla's web-ext is Firefox-focused; we treat warnings as info only
        # but still fail on hard errors. Chrome MV3 manifests pass cleanly.
        run: web-ext lint --source-dir=. --warnings-as-errors=false --self-hosted

  # Aggregate gate so branch protection only needs ONE required check.
  # Add this single job ("CI / required") to GitHub branch-protection rules.
  required:
    name: required
    runs-on: ubuntu-latest
    needs: [lint-js, lint-python, lint-shell, validate-manifest, web-ext-lint]
    if: always()
    steps:
      - name: Verify all upstream jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
