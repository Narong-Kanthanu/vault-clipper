<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vault Clipper — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="container">
    <header>
      <svg class="logo" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7f6df2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <h1>Vault Clipper</h1>
    </header>

    <section class="card">
      <h2>Vaults</h2>
      <p class="hint">
        Each vault is a folder on your computer. Clipped pages are saved into the
        <code>Default folder</code> inside that vault (e.g. <code>raw/</code>).
      </p>

      <div id="vaults-list" class="vaults-list" aria-live="polite"></div>

      <button id="add-vault" class="btn btn-secondary" type="button">+ Add vault</button>
    </section>

    <section class="card">
      <h2>Defaults</h2>
      <div class="field">
        <label for="default-folder">Default folder (relative to vault)</label>
        <input type="text" id="default-folder" placeholder="raw">
        <p class="hint">Subfolder inside each vault where clips are saved. Created if it does not exist.</p>
      </div>
      <div class="field checkbox-field">
        <label>
          <input type="checkbox" id="download-images-default" checked>
          Download images to <code>{folder}/assets/</code> by default
        </label>
      </div>
    </section>

    <div class="actions">
      <button id="save" class="btn btn-primary" type="button">Save</button>
      <span id="save-status" class="save-status" role="status"></span>
    </div>

    <footer>
      <p>
        Vault Clipper is open source — see the
        <a href="https://github.com/Narong-Kanthanu/vault-clipper" target="_blank" rel="noopener">project on GitHub</a>.
      </p>
    </footer>
  </main>

  <template id="vault-row-template">
    <div class="vault-row">
      <div class="field">
        <label>Label</label>
        <input class="vault-label" type="text" placeholder="Personal">
      </div>
      <div class="field grow">
        <label>Folder path (absolute)</label>
        <input class="vault-path" type="text" placeholder="/Users/you/Vaults/Personal" spellcheck="false">
      </div>
      <button class="btn btn-icon vault-remove" type="button" title="Remove vault" aria-label="Remove vault">×</button>
    </div>
  </template>

  <script src="options.js"></script>
</body>
</html>
